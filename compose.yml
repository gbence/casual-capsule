services:
  cli:
    build:
      context: .
      secrets:
        - github_api_token
    user: "1000:1000"
    hostname: capsule
    group_add:
      - "${DOCKER_GID:-999}"
    working_dir: /home/workspace
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DOCKER_GID=${DOCKER_GID:-999}
    restart: "no"
    volumes:
      - ${CAPSULE_WORKDIR:-${CC_WORKDIR:-${PWD}}}:/home/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - home:/home/user

secrets:
  github_api_token:
    environment: GITHUB_API_TOKEN

volumes:
  home:

services:
  cli:
    build:
      context: .
      args:
        CAPSULE_UID: "${CAPSULE_UID:-1000}"
        CAPSULE_GID: "${CAPSULE_GID:-100}"
      secrets:
        - github_api_token
    hostname: capsule
    working_dir: /home/workspace
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DOCKER_GID=${DOCKER_GID:-999}
      - CAPSULE_UID=${CAPSULE_UID:-}
      - CAPSULE_GID=${CAPSULE_GID:-}
    restart: "no"
    volumes:
      - ${CAPSULE_WORKDIR:-${CC_WORKDIR:-${PWD}}}:/home/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - home:/home/user

secrets:
  github_api_token:
    environment: GITHUB_API_TOKEN

volumes:
  home:

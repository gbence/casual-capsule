services:
  cli:
    build: .
    working_dir: /workspace
    environment:
      - GITHUB_TOKEN
      - OPENAI_BASE_URL
      - OPENAI_API_KEY
    restart: "no"
    volumes:
      - ${CC_WORKDIR:-${PWD}}:/workspace
      - ${HOME}/.codex:/home/user/.codex
      - ${HOME}/.config/gh:/home/user/.config/gh
      - ${HOME}/.local/share/gh:/home/user/.local/share/gh
